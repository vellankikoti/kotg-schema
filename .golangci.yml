version: "2"

linters:
  # Disable style-only and opinionated linters that would reject
  # intentional one-liner error checks in example/test code.
  disable:
    - nlreturn
    - wsl
    - godot
    - exhaustruct
    - varnamelen
    - ireturn
    - cyclop
    - funlen
    - gocognit
    - maintidx
    - lll
    - mnd
    - gomnd

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
